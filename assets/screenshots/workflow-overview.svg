<svg width="1000" height="1560" viewBox="0 0 1000 1560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AI Messenger bot architecture</title>
<desc>Flow diagram of a Facebook Messenger AI bot built on n8n, showing message intake, filtering, dual AI brain response and analysis, and a human handoff system with 24-hour auto-resume.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b6b66" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="1560" fill="#FFFFFF"/>
<rect x="260" y="40" width="320" height="50" rx="10" fill="#F1F0EE" stroke="#A8A6A0" stroke-width="1.4"/><text x="420.0" y="65.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#3A3934" font-family="Helvetica, Arial, sans-serif">Facebook Messenger user</text><line x1="420" y1="90" x2="420" y2="130" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="260" y="130" width="320" height="50" rx="10" fill="#E8F1FC" stroke="#4C8DDB" stroke-width="1.4"/><text x="420.0" y="147.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#103A66" font-family="Helvetica, Arial, sans-serif">Meta webhook</text><text x="420.0" y="169.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#2A5A8C" font-family="Helvetica, Arial, sans-serif">Facebook Graph API event</text><line x1="420" y1="180" x2="420" y2="220" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="260" y="220" width="320" height="50" rx="10" fill="#E8F1FC" stroke="#4C8DDB" stroke-width="1.4"/><text x="420.0" y="245.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#103A66" font-family="Helvetica, Arial, sans-serif">n8n webhook trigger</text><line x1="420" y1="270" x2="420" y2="310" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="260" y="310" width="320" height="62" rx="10" fill="#E8F1FC" stroke="#4C8DDB" stroke-width="1.4"/><text x="420.0" y="333.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#103A66" font-family="Helvetica, Arial, sans-serif">Input data extraction</text><text x="420.0" y="355.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#2A5A8C" font-family="Helvetica, Arial, sans-serif">user_message, sender_id, page_id</text><line x1="420" y1="372" x2="420" y2="410" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><polygon points="420,410.0 570.0,465 420,520.0 270.0,465" fill="#FFF4E0" stroke="#E2A73B" stroke-width="1.4"/><text x="420" y="457" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#6B4A0C" font-family="Helvetica, Arial, sans-serif">Active human</text><text x="420" y="475" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#6B4A0C" font-family="Helvetica, Arial, sans-serif">handoff window?</text><rect x="700" y="435" width="260" height="62" rx="10" fill="#F0F2F5" stroke="#9AA5B1" stroke-width="1.4"/><text x="830.0" y="458.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#33404D" font-family="Helvetica, Arial, sans-serif">Bot stays silent</text><text x="830.0" y="480.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#55606B" font-family="Helvetica, Arial, sans-serif">Admin is replying manually</text><path d="M570.0 465 L700 465 L700 465" fill="none" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><text x="600.0" y="450" text-anchor="middle" font-size="11.5" fill="#767670" font-family="Helvetica, Arial, sans-serif">Yes</text><line x1="420" y1="520" x2="420" y2="556" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><text x="436" y="538" text-anchor="start" font-size="11.5" fill="#767670" font-family="Helvetica, Arial, sans-serif">No</text><polygon points="420,556.0 560.0,611 420,666.0 280.0,611" fill="#FFF4E0" stroke="#E2A73B" stroke-width="1.4"/><text x="420" y="611" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#6B4A0C" font-family="Helvetica, Arial, sans-serif">Text or media?</text><rect x="700" y="581" width="260" height="62" rx="10" fill="#F0F2F5" stroke="#9AA5B1" stroke-width="1.4"/><text x="830.0" y="604.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#33404D" font-family="Helvetica, Arial, sans-serif">Send warning reply</text><text x="830.0" y="626.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#55606B" font-family="Helvetica, Arial, sans-serif">"Please send text only"</text><path d="M560.0 611 L700 611 L700 611" fill="none" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><text x="594.0" y="596" text-anchor="middle" font-size="11.5" fill="#767670" font-family="Helvetica, Arial, sans-serif">Media</text><line x1="420" y1="666" x2="420" y2="702" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><text x="436" y="684" text-anchor="start" font-size="11.5" fill="#767670" font-family="Helvetica, Arial, sans-serif">Text</text><polygon points="420,702.0 560.0,757 420,812.0 280.0,757" fill="#FFF4E0" stroke="#E2A73B" stroke-width="1.4"/><text x="420" y="757" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#6B4A0C" font-family="Helvetica, Arial, sans-serif">Casual message?</text><rect x="700" y="727" width="260" height="62" rx="10" fill="#F0F2F5" stroke="#9AA5B1" stroke-width="1.4"/><text x="830.0" y="750.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#33404D" font-family="Helvetica, Arial, sans-serif">Fixed reply template</text><text x="830.0" y="772.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#55606B" font-family="Helvetica, Arial, sans-serif">Branded welcome message</text><path d="M560.0 757 L700 757 L700 757" fill="none" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><text x="590.0" y="742" text-anchor="middle" font-size="11.5" fill="#767670" font-family="Helvetica, Arial, sans-serif">Yes</text><line x1="420" y1="812" x2="420" y2="848" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><text x="436" y="830" text-anchor="start" font-size="11.5" fill="#767670" font-family="Helvetica, Arial, sans-serif">Genuine</text><rect x="260" y="848" width="320" height="70" rx="10" fill="#F1EEFC" stroke="#8E7CC3" stroke-width="1.4"/><text x="420.0" y="875.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#3D2E66" font-family="Helvetica, Arial, sans-serif">AI Brain 1 — response engine</text><text x="420.0" y="897.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#5B4A8C" font-family="Helvetica, Arial, sans-serif">Gemini 2.5 Flash + knowledge base</text><line x1="420" y1="918" x2="420" y2="954" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="260" y="954" width="320" height="50" rx="10" fill="#E6F7F1" stroke="#3FAE85" stroke-width="1.4"/><text x="420.0" y="979.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#0F5A41" font-family="Helvetica, Arial, sans-serif">Reply sent to user</text><line x1="420" y1="1004" x2="420" y2="1040" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="260" y="1040" width="320" height="70" rx="10" fill="#F1EEFC" stroke="#8E7CC3" stroke-width="1.4"/><text x="420.0" y="1067.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#3D2E66" font-family="Helvetica, Arial, sans-serif">AI Brain 2 — conversation analyst</text><text x="420.0" y="1089.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#5B4A8C" font-family="Helvetica, Arial, sans-serif">Reads full session, decides next step</text><line x1="420" y1="1110" x2="420" y2="1146" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><polygon points="420,1146.0 560.0,1201 420,1256.0 280.0,1201" fill="#FFF4E0" stroke="#E2A73B" stroke-width="1.4"/><text x="420" y="1201" text-anchor="middle" dominant-baseline="central" font-size="14.5" font-weight="600" fill="#6B4A0C" font-family="Helvetica, Arial, sans-serif">Decision</text><rect x="100" y="1290" width="320" height="74" rx="10" fill="#FDEEE9" stroke="#E17A52" stroke-width="1.4"/><text x="260.0" y="1319.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#7A3016" font-family="Helvetica, Arial, sans-serif">Admin notified + handoff opens</text><text x="260.0" y="1341.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#96502C" font-family="Helvetica, Arial, sans-serif">24h reply deadline, bot pauses for user</text><path d="M280.0 1201 L260 1201 L260 1290" fill="none" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><text x="270.0" y="1246" text-anchor="middle" font-size="11.5" fill="#767670" font-family="Helvetica, Arial, sans-serif">NOTIFY_ADMIN</text><rect x="100" y="1394" width="320" height="60" rx="10" fill="#F0F2F5" stroke="#9AA5B1" stroke-width="1.4"/><text x="260.0" y="1416.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#33404D" font-family="Helvetica, Arial, sans-serif">User gets confirmation</text><text x="260.0" y="1438.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#55606B" font-family="Helvetica, Arial, sans-serif">"An admin will reply within 24h"</text><line x1="260" y1="1364" x2="260" y2="1394" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="100" y="1484" width="320" height="60" rx="10" fill="#E6F7F1" stroke="#3FAE85" stroke-width="1.4"/><text x="260.0" y="1506.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#0F5A41" font-family="Helvetica, Arial, sans-serif">Auto-resume after 24h</text><text x="260.0" y="1528.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#2A7A5C" font-family="Helvetica, Arial, sans-serif">if admin hasn't replied yet</text><line x1="260" y1="1454" x2="260" y2="1484" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><rect x="580" y="1290" width="320" height="74" rx="10" fill="#F1F0EE" stroke="#A8A6A0" stroke-width="1.4"/><text x="740.0" y="1319.0" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#3A3934" font-family="Helvetica, Arial, sans-serif">Monitor / no action</text><text x="740.0" y="1341.0" text-anchor="middle" dominant-baseline="central" font-size="12.5" fill="#55534C" font-family="Helvetica, Arial, sans-serif">Conversation continues normally</text><path d="M560.0 1201 L740 1201 L740 1290" fill="none" stroke="#6b6b66" stroke-width="1.6" marker-end="url(#arrow)"/><text x="650.0" y="1246" text-anchor="middle" font-size="11.5" fill="#767670" font-family="Helvetica, Arial, sans-serif">MONITOR / NO_ACTION</text>
</svg>